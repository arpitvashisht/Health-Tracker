<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Health Tracker AI</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Health Tracker AI</p>
        <h1>Calorie Prediction Dashboard</h1>
      </div>
      <div class="model-status" id="modelStatus">Checking model</div>
    </header>

    <main class="app-shell">
      <section class="panel input-panel">
        <div class="panel-heading">
          <h2>Prediction Inputs</h2>
          <button class="ghost-button" type="button" id="resetButton">Reset</button>
        </div>

        <form id="predictionForm" class="form-grid">
          <label>
            User ID
            <input name="id" type="number" value="1503960366" required>
          </label>

          <label>
            Steps
            <input name="steps" type="number" min="0" value="500" required>
          </label>

          <label>
            Total intensity
            <input name="totalIntensity" type="number" min="0" value="20" required>
          </label>

          <label>
            Average intensity
            <input name="averageIntensity" type="number" min="0" step="0.01" value="0.33" required>
          </label>

          <label>
            Hour
            <select name="hour" required></select>
          </label>

          <label>
            Day
            <select name="dayOfWeek" required>
              <option value="0">Monday</option>
              <option value="1">Tuesday</option>
              <option value="2" selected>Wednesday</option>
              <option value="3">Thursday</option>
              <option value="4">Friday</option>
              <option value="5">Saturday</option>
              <option value="6">Sunday</option>
            </select>
          </label>

          <div class="field-group">
            <h3>Heart</h3>
            <label>
              Avg bpm
              <input name="heartRateMean" type="number" min="0" placeholder="optional">
            </label>
          </div>

          <div class="field-group">
            <h3>Sleep</h3>
            <label>
              Sleep minutes
              <input name="sleepMinutes" type="number" min="0" max="60" placeholder="optional">
            </label>
          </div>

          <div class="field-group">
            <h3>Body</h3>
            <label>
              Weight kg
              <input name="weightKg" type="number" min="0" step="0.1" placeholder="optional">
            </label>
            <label>
              BMI
              <input name="bmi" type="number" min="0" step="0.1" placeholder="optional">
            </label>
          </div>

          <button class="primary-button" type="submit">Predict Calories</button>
        </form>
      </section>

      <section class="panel result-panel">
        <div class="panel-heading">
          <h2>Prediction</h2>
          <span class="run-state" id="runState">Ready</span>
        </div>

        <div class="calorie-readout">
          <span id="calorieValue">--</span>
          <small>calories</small>
        </div>

        <div class="meter" aria-hidden="true">
          <div class="meter-fill" id="meterFill"></div>
        </div>

        <div class="metric-grid">
          <div>
            <span>Model features</span>
            <strong id="featureCount">40</strong>
          </div>
          <div>
            <span>Rows trained</span>
            <strong>24,084</strong>
          </div>
          <div>
            <span>MAE</span>
            <strong>0.76</strong>
          </div>
          <div>
            <span>R2</span>
            <strong>0.994</strong>
          </div>
        </div>

        <div class="dataset-strip" aria-label="Datasets used">
          <span>Hourly calories</span>
          <span>Hourly steps</span>
          <span>Hourly intensity</span>
          <span>Minute steps</span>
          <span>Minute intensity</span>
          <span>METs</span>
          <span>Sleep</span>
          <span>Heart rate</span>
          <span>Weight</span>
        </div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
